<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 Simulator</title>
  <meta name="description" content="Compact World Cup 2026 simulator UI designed to fit cleanly inside a modal." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="modal-shell">
    <section class="modal-card">
      <header class="modal-hero">
        <div>
          <p class="eyebrow">World Cup 2026</p>
          <h1>Simulator</h1>
          <p class="hero-copy">Preencha os placares da fase de grupos, acompanhe os melhores terceiros e avance o mata-mata sem poluição visual.</p>
        </div>
        <div class="hero-actions">
          <button class="secondary-btn" id="copyBtn">Copy link</button>
          <button class="secondary-btn" id="resetBtn">Reset</button>
          <button class="primary-btn" id="shareBtn">Share</button>
        </div>
      </header>

      <p class="status" id="shareStatus">Ready.</p>
      <div class="hero-stats" id="heroStats"></div>

      <nav class="section-nav" id="stepNav"></nav>

      <section class="section-panel" id="groupsSection">
        <div class="section-head">
          <div>
            <p class="section-kicker">Group stage</p>
            <h2>Groups</h2>
          </div>
          <div class="group-pager" id="groupPager"></div>
        </div>
        <div id="groupsContainer"></div>
      </section>

      <section class="section-panel" id="qualifiersSection">
        <div class="section-head">
          <div>
            <p class="section-kicker">Qualification</p>
            <h2>Seeds and best third places</h2>
          </div>
        </div>
        <div id="qualifiersContainer"></div>
      </section>

      <section class="section-panel" id="knockoutSection">
        <div class="section-head">
          <div>
            <p class="section-kicker">Knockout</p>
            <h2>Bracket</h2>
          </div>
        </div>
        <div id="knockoutContainer"></div>
      </section>

      <section class="section-panel" id="championSection">
        <div class="section-head">
          <div>
            <p class="section-kicker">Champion</p>
            <h2>Outcome</h2>
          </div>
        </div>
        <div id="championContainer"></div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
