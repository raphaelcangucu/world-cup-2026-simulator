<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulador Copa do Mundo 2026</title>
  <meta name="description" content="Simulador completo da Copa do Mundo 2026 com fase de grupos, classificação e bracket do mata-mata." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="hero-panel">
      <div>
        <p class="eyebrow">Copa do Mundo 2026</p>
        <h1>Simulador</h1>
        <p class="hero-copy">Fase de grupos com dados oficiais da FIFA, melhores terceiros e bracket do mata-mata com edição direta.</p>
      </div>
      <div class="hero-actions">
        <button class="secondary-btn" id="copyBtn">Copiar link</button>
        <button class="secondary-btn" id="resetBtn">Resetar</button>
        <button class="primary-btn" id="shareBtn">Compartilhar</button>
      </div>
    </section>

    <p class="status" id="shareStatus">Pronto.</p>
    <div class="hero-stats" id="heroStats"></div>

    <nav class="section-nav" id="stepNav"></nav>

    <section class="section-panel" id="groupsSection">
      <div class="section-head">
        <div>
          <p class="section-kicker">Fase de grupos</p>
          <h2>Grupos</h2>
        </div>
        <div class="group-pager" id="groupPager"></div>
      </div>
      <div id="groupsContainer"></div>
    </section>

    <section class="section-panel" id="qualifiersSection">
      <div class="section-head">
        <div>
          <p class="section-kicker">Classificação</p>
          <h2>Seeds e melhores terceiros</h2>
        </div>
      </div>
      <div id="qualifiersContainer"></div>
    </section>

    <section class="section-panel" id="knockoutSection">
      <div class="section-head">
        <div>
          <p class="section-kicker">Mata-mata</p>
          <h2>Bracket</h2>
        </div>
      </div>
      <div class="bracket-stage">
        <div id="bracketBoard" class="bracket-board"></div>
      </div>
      <div id="knockoutControls"></div>
    </section>

    <section class="section-panel" id="championSection">
      <div class="section-head">
        <div>
          <p class="section-kicker">Campeão</p>
          <h2>Desfecho</h2>
        </div>
      </div>
      <div id="championContainer"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
